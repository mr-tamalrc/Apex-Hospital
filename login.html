<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Login Page || PowSome Hospital</title>
		<link
			rel="stylesheet"
			href="CSS/login.css" />
	</head>
	<body>
		<div class="container">
			<div class="header">
				<div class="hospital-name">PowSome Hospital</div>
				<h1>Login</h1>
			</div>
			<div class="login-form">
				<div class="field">
					<label for="username">Username:</label>
					<input
						type="text"
						id="username"
						name="username"
						required />
				</div>
				<div class="field">
					<label for="password">Password:</label>
					<input
						type="password"
						id="password"
						name="password"
						required />
				</div>
				<button type="submit">Login</button>
			</div>
		</div>
	</body>
</html>
